server:
  port: 8083

spring:
  application:
    name: automation-service
  config:
    import: "optional:configserver:http://localhost:8888"
  data:
    mongodb:
      uri: mongodb://localhost:27017/automation_db

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
