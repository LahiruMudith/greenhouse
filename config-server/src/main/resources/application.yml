server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: file://${user.home}/greenhouse/config-repo
          default-label: main
          search-paths: "."
        native:
          search-locations: file:${user.dir}/../config-repo

management:
  endpoints:
    web:
      exposure:
        include: health,info
