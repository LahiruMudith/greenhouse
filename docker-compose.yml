#version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: agms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1212
      MYSQL_DATABASE: zone_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mongodb:
    image: mongo:7.0
    container_name: agms-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
  mongo_data:
